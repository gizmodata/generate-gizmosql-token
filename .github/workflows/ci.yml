name: generate-gizmosql-token-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install --editable ".[dev]"

      - name: Run unit tests
        run: pytest -v -m "not integration"

  integration-tests:
    name: Integration tests (Docker + GizmoSQL)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev + integration extras
        run: |
          python -m pip install --upgrade pip
          pip install --editable ".[dev,integration]"

      - name: Pull GizmoSQL image
        run: docker pull gizmodata/gizmosql:latest

      - name: Run integration tests
        run: pytest -v -m integration

  build-n-publish:
    name: Build and publish Python 🐍 distributions 📦 to PyPI
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    permissions:
      id-token: write  # Required for trusted publishing to PyPI and Sigstore attestations
      contents: write  # Required for creating GitHub Releases
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pypa/build
        run: >-
          python -m
          pip install
          build
          --user

      - name: Build a binary wheel and a source tarball
        run: >-
          python -m
          build
          --sdist
          --wheel
          --outdir dist/
          .

      - name: Publish distribution 📦 to PyPI (with attestations)
        if: startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@release/v1
        # attestations are enabled by default for Trusted Publishing

      - name: Extract changelog section for this tag
        id: changelog
        if: startsWith(github.ref, 'refs/tags/')
        run: |
          version="${GITHUB_REF_NAME#v}"
          notes=$(awk -v header="## v${version} " '
            index($0, header) == 1 { p=1; next }
            p && /^## v/ { exit }
            p { print }
          ' CHANGELOG.md)
          # Trim leading/trailing blank lines so the rendered release page is clean.
          notes=$(printf '%s\n' "$notes" | awk '
            NF { found=1 }
            found { buf = buf $0 ORS }
            END { sub(/\n+$/, "", buf); print buf }
          ')
          {
            echo "notes<<CHANGELOG_EOF"
            if [ -n "$notes" ]; then
              echo "$notes"
            else
              echo "_No CHANGELOG.md entry found for \`v${version}\`._"
            fi
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          body: ${{ steps.changelog.outputs.notes }}
          generate_release_notes: true
          files: dist/*
