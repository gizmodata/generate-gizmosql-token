name: generate-gizmosql-token-ci

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  unit-tests:
    name: Unit tests on Python ${{ matrix.python-version }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12", "3.13"]
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install package with dev extras
        run: |
          python -m pip install --upgrade pip
          pip install --editable ".[dev]"

      - name: Run unit tests
        run: pytest -v -m "not integration"

  integration-tests:
    name: Integration tests (Docker + GizmoSQL)
    runs-on: ubuntu-latest
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install package with dev + integration extras
        run: |
          python -m pip install --upgrade pip
          pip install --editable ".[dev,integration]"

      - name: Pull GizmoSQL image
        run: docker pull gizmodata/gizmosql:latest

      - name: Run integration tests
        run: pytest -v -m integration

  build-n-publish:
    name: Build and publish Python 🐍 distributions 📦 to PyPI
    runs-on: ubuntu-latest
    needs: [unit-tests, integration-tests]
    permissions:
      id-token: write  # Required for trusted publishing to PyPI and Sigstore attestations
      contents: read  # Required for checkout
    steps:
      - name: Check out code
        uses: actions/checkout@v4

      - name: Set up Python 3.12
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install pypa/build
        run: >-
          python -m
          pip install
          build
          --user

      - name: Build a binary wheel and a source tarball
        run: >-
          python -m
          build
          --sdist
          --wheel
          --outdir dist/
          .

      - name: Publish distribution 📦 to PyPI (with attestations)
        if: startsWith(github.ref, 'refs/tags/')
        uses: pypa/gh-action-pypi-publish@release/v1
        # attestations are enabled by default for Trusted Publishing
